<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Taskr – Bevestiging</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>body{background:#000;color:#fff;font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;text-align:center}p{opacity:.6;font-size:14px}</style>
</head>
<body>
<div>
  <p>E-mail bevestigd. De app openen...</p>
</div>
<script>
  var hash = window.location.hash || window.location.search;
  if (hash) {
    window.location.href = "taskr://confirm" + hash;
  }
  setTimeout(function() {
    document.querySelector('p').textContent = 'Open de Taskr app handmatig om verder te gaan.';
  }, 3000);
</script>
</body>
</html>
